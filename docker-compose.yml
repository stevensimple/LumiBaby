services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://lumibaby:lumibaby@db:5432/lumibaby
      - ENABLE_AUTH=true
      - CORS_ORIGINS=*
      - INACTIVITY_ALERT_MINUTES=20
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lumibaby
      POSTGRES_USER: lumibaby
      POSTGRES_PASSWORD: lumibaby
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumibaby"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
